name: cleanmate_rush
description: Cleanmate Rush — web-only platformer for Cleanmate.
version: 1.0.0+16
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: 3.16.0

dependencies:
  app_ui:
    path: packages/app_ui
  audioplayers: ^5.2.0
  bloc: ^8.1.2
  equatable: ^2.0.5
  firebase_analytics: ^10.8.7
  firebase_core: ^2.25.5
  flame: ^1.10.0
  flame_behaviors: ^1.0.0
  flame_tiled: ^1.15.0
  flow_builder: ^0.0.9
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_localizations:
    sdk: flutter
  http: ^1.6.0
  intl: ^0.20.2
  leaderboard_repository:
    path: packages/leaderboard_repository
  leap: ^0.2.1
  logging: ^1.2.0
  ordered_set: ^5.0.2
  pathxp: ^0.4.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  socket_io_client: ^3.0.2
  url_launcher: ^6.2.1

dev_dependencies:
  bloc_test: ^9.1.2
  flame_test: ^1.14.0
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  very_good_analysis: ^5.0.0

dependency_overrides:
  leap:
    git:
      url: https://github.com/VeryGoodOpenSource/leap.git
      ref: vgv
      path: packages/leap

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/map/
    - assets/map/anim/
    - assets/map/tiles/
    - assets/map/objects/
    - assets/music/
    - assets/sfx/

flutter_launcher_icons:
  web:
    generate: true
    image_path: 'assets/images/game_logo.png'
    background_color: '#F5F5F5'
    theme_color: '#F97316'

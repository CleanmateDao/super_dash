<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta
      name="description"
      content="Cleanmate Rush — a web platformer game built with Flutter and Flame."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Cleanmate Rush" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <meta
      property="og:image"
      content="https://storage.googleapis.com/cleanmate-rush-game.appspot.com/share.png"
    />
    <meta property="og:image:type" content="image/png" />

    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Cleanmate Rush</title>
    <link rel="manifest" href="manifest.json" />

    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=UA-67589403-11"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "UA-67589403-11");
    </script>
    <style type="text/css">
      html {
        height: 100%;
      }

      body.loading-mode {
        min-height: 100%;
        display: flex;
        flex: 1;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        overflow: hidden;
        margin: 0;
        background: #f5f5f5;
      }

      @media (prefers-color-scheme: dark) {
        body.loading-mode {
          background: #0f0f0f;
        }
      }

      .loading-mode p {
        font-family: system-ui, sans-serif;
        font-style: normal;
        font-weight: 500;
        font-size: 14px;
        line-height: 20px;
        text-align: center;
        color: #1a1a1a;
      }

      @media (prefers-color-scheme: dark) {
        .loading-mode p {
          color: #ebebeb;
        }
      }

      .loading-mode #progress-bar {
        position: absolute;
        bottom: 120px;
        padding: 3px;
        width: min(400px, calc(100vw - 48px));
        background: rgba(26, 26, 26, 0.08);
        border-radius: 100px;
      }

      @media (prefers-color-scheme: dark) {
        .loading-mode #progress-bar {
          background: rgba(235, 235, 235, 0.12);
        }
      }

      .loading-mode #progress-indicator {
        height: 8px;
        width: 40%;
        background: linear-gradient(135deg, #f97316 0%, #da4f0c 100%);
        border-radius: 100px;
        animation: loading-pulse 1.2s ease-in-out infinite alternate;
      }

      @keyframes loading-pulse {
        from {
          width: 20%;
          margin-left: 0%;
        }

        to {
          width: 60%;
          margin-left: 40%;
        }
      }

      #splash-copy {
        position: absolute;
        bottom: 148px;
        font-size: 18px;
        font-weight: 600;
      }

      #top-credit {
        position: absolute;
        top: 24px;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        pointer-events: none;
      }

      #top-credit img {
        height: 64px;
        width: auto;
      }

      #top-credit .credit-text {
        max-width: 520px;
        padding: 0 16px;
      }
    </style>
  </head>

  <body class="loading-mode">
    <div id="top-credit">
      <p class="credit-text">a fork of</p>
      <img src="superdash_logo.png" alt="SuperDash logo" />
    </div>
    <p id="splash-copy">Loading...</p>
    <div id="progress-bar">
      <div id="progress-indicator"></div>
    </div>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
